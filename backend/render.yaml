services:
  - type: web
    name: yeoniassi-api
    env: docker
    region: singapore
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yeoniassi-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: yeoniassi-db
    databaseName: yeoniassi
    user: yeoniassi_admin
    plan: free
    region: singapore
